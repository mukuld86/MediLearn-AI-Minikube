services:
  - type: web
    name: medilearn-ai
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
